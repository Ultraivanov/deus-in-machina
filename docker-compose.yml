version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: dsr-postgres
    environment:
      POSTGRES_USER: dsr
      POSTGRES_PASSWORD: dsr_dev_password
      POSTGRES_DB: dsr_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dsr -d dsr_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dsr-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
